# Merges the two language boundaries into one project number. Coverage is a
# signal here, not a gate: an unreleased solo project should not block work on
# a percentage, so status checks are informational and never fail a PR.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Each CI upload tags its language boundary. carryforward keeps the other
# flag's last value when only one side changes, so the merged total stays
# meaningful on partial runs.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: engine
      paths:
        - engine/crates/
    - name: mantui
      paths:
        - apps/mantui/src/

comment:
  layout: "reach, flags, files"
  require_changes: true
