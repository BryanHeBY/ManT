# Verifies every source boundary used by ManT without publishing artifacts.
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# A pull request only needs to read the checked-out repository. Keep release
# permissions out of this workflow so untrusted changes cannot publish data.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  RUST_MSRV: 1.88.0

jobs:
  build:
    name: Build (Linux x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            man-db \
            zlib1g-dev

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Cache Cargo dependencies and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            engine/target
          key: cargo-v1-linux-x64-stable-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: |
            cargo-v1-linux-x64-stable-

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # The local build is the canonical verification boundary: frozen Bun
      # dependencies, TypeScript, Rust fmt/test/clippy, native release builds,
      # UI tests, and packaged executable smoke tests all run here.
      - name: Build and test
        run: bun run build

      - name: Verify vendored libmandoc matches upstream
        run: bash engine/crates/libmandoc-rs/scripts/sync-vendor --verify

  macos-native:
    # Guards the checked-in macOS C configuration (config/macos.h and its
    # compat sources) against bit-rot. Release signing and packaging require
    # certificates and are intentionally out of scope; this only compiles and
    # tests the native crates on macOS/arm64, which needs no secrets.
    name: Native (macOS arm64)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Cache Cargo dependencies and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            engine/target
          key: cargo-v1-macos-arm64-stable-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: |
            cargo-v1-macos-arm64-stable-

      # Compile and test the native workspace so the macOS target family is
      # exercised on every change, not only at release time. clang and `man`
      # ship with the runner image, so libmandoc builds against config/macos.h.
      - name: Test Rust workspace on macOS
        run: cargo test --locked --manifest-path engine/Cargo.toml --workspace

      - name: Lint Rust workspace on macOS
        run: cargo clippy --locked --manifest-path engine/Cargo.toml --workspace --all-targets -- -D warnings

  rust-msrv:
    name: Rust MSRV (1.88.0)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            man-db \
            zlib1g-dev

      - name: Install minimum supported Rust toolchain
        run: rustup toolchain install "$RUST_MSRV" --profile minimal

      - name: Cache Cargo dependencies and MSRV build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            engine/target
          key: cargo-v1-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_MSRV }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_MSRV }}-

      - name: Test Rust workspace on MSRV
        run: cargo +"$RUST_MSRV" test --locked --manifest-path engine/Cargo.toml --workspace

  coverage:
    # Reports line coverage for both language boundaries. This runs beside the
    # canonical build rather than inside it so coverage instrumentation never
    # slows or gates the primary verification path. Codecov merges the two
    # flags (mantui, engine) into a single project number.
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            man-db \
            zlib1g-dev

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview
          rustup default stable

      - name: Cache Cargo dependencies and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            engine/target
          key: cargo-v1-linux-x64-coverage-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: |
            cargo-v1-linux-x64-coverage-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frozen Bun dependencies
        run: bun install --frozen-lockfile

      - name: Collect Rust coverage
        run: cargo llvm-cov --locked --manifest-path engine/Cargo.toml --workspace --lcov --output-path engine-lcov.info

      - name: Collect TypeScript coverage
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload engine coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: engine-lcov.info
          flags: engine
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload mantui coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          flags: mantui
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
