# Verifies every source boundary used by ManT without publishing artifacts.
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# A pull request only needs to read the checked-out repository. Keep release
# permissions out of this workflow so untrusted changes cannot publish data.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  RUST_MSRV: 1.85.0

jobs:
  build:
    name: Build (Linux x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            man-db \
            zlib1g-dev

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Cache Cargo dependencies and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            native/target
          key: cargo-v1-linux-x64-stable-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            cargo-v1-linux-x64-stable-

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # The local build is the canonical verification boundary: frozen Bun
      # dependencies, TypeScript, Rust fmt/test/clippy, native release builds,
      # UI tests, and packaged executable smoke tests all run here.
      - name: Build and test
        run: bun run build

  rust-msrv:
    name: Rust MSRV (1.85.0)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            man-db \
            zlib1g-dev

      - name: Install minimum supported Rust toolchain
        run: rustup toolchain install "$RUST_MSRV" --profile minimal

      - name: Cache Cargo dependencies and MSRV build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            native/target
          key: cargo-v1-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_MSRV }}-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_MSRV }}-

      - name: Test Rust workspace on MSRV
        run: cargo +"$RUST_MSRV" test --locked --manifest-path native/Cargo.toml --workspace
